apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * react-native-config (Android): do NOT use stock `dotenv.gradle` alone — it calls `loadDotEnv()`
 * once at configuration time. Gradle sync / generic tasks often yield no flavor match, so it
 * falls back to `.env`, and `defaultConfig` would get one env map for every variant.
 *
 * We inject `.env.dev` / `.env.qa` / `.env.prod` per merged variant (`devDebug`, `qaRelease`, …).
 */

ext.readEnvFileForRnc = { File f ->
    def env = [:]
    if (!f.exists()) return env
    f.eachLine { line ->
        def trimmed = line.trim()
        if (trimmed.isEmpty() || trimmed.startsWith('#')) return
        def exportStripped = trimmed.replaceFirst(/^export\s+/, '')
        def eq = exportStripped.indexOf('=')
        if (eq <= 0) return
        def key = exportStripped.substring(0, eq).trim()
        def val = exportStripped.substring(eq + 1).trim()
        if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
            val = val.substring(1, val.length() - 1)
        }
        if (!key.isEmpty()) env.put(key, val)
    }
    return env
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   Only debug variants skip JS bundling and use Metro. Release variants always bundle.
    debuggableVariants = ["devDebug", "qaDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig true
    }

    namespace "com.codeandtheory.templatepipelinetest"
    defaultConfig {
        applicationId "com.codeandtheory.templatepipelinetest"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        // react-native-config: BuildConfig lives in `namespace`, not in applicationId when using
        // applicationIdSuffix — without this, native code resolves the wrong class and env is wrong.
        //
        // Resource shrinking (buildTypes.release shrinkResources) can strip unused strings. The
        // `build_config_package` string is kept via app/src/main/res/raw/keep.xml (tools:keep).
        // If you rename or remove this resValue key, update keep.xml in the same change.
        resValue "string", "build_config_package", "com.codeandtheory.templatepipelinetest"
    }

    flavorDimensions "env"
    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            resValue "string", "app_name", "TestBareBootStrapWorkflow Dev"
            buildConfigField "String", "ENV", '"development"'
        }
        qa {
            dimension "env"
            applicationIdSuffix ".qa"
            resValue "string", "app_name", "TestBareBootStrapWorkflow QA"
            buildConfigField "String", "ENV", '"staging"'
        }
        prod {
            dimension "env"
            resValue "string", "app_name", "TestBareBootStrapWorkflow"
            buildConfigField "String", "ENV", '"production"'
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
        }
        release {
            // Caution! In production, replace the debug keystore with a real release keystore.
            // See https://reactnative.dev/docs/signed-apk-android
            signingConfig signingConfigs.debug
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    applicationVariants.configureEach { variant ->
        def appRoot = rootProject.projectDir.parentFile
        def envFlavor = variant.productFlavors.find { it.dimension == 'env' }?.name?.toLowerCase()
        def envRel = envFlavor == 'qa'
                ? '.env.qa'
                : envFlavor == 'prod' ? '.env.prod' : '.env.dev'
        def envFile = new File(appRoot, envRel)
        if (!envFile.exists()) {
            logger.lifecycle("react-native-config: missing env file ${envFile} for variant ${variant.name}")
        }
        def envMap = project.readEnvFileForRnc(envFile)
        envMap.each { k, val ->
            def escaped = "${val}".replaceAll('%', '\\\\u0025').replace('"', '\\"')
            variant.buildConfigField 'String', "${k}", "\"${escaped}\""
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
